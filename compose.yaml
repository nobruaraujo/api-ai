services:
  mysql:
    image: 'mysql:8.4'
    container_name: mysql_db
    restart: always
    environment:
      TZ: 'America/Sao_Paulo'
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - '3306:3306'
    healthcheck:
      # O comando 'mysqladmin ping' garante que o motor do banco está PRONTO
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-brvno}", "-p${MYSQL_PASSWORD:-4rjo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: irmandade_backend
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Adicionamos parâmetros de reconexão automática na URL
      TZ: 'America/Sao_Paulo'
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}