services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      TZ: "America/Sao_Paulo"
      SPRING_DATASOURCE_DATABASE: ${SPRING_DATASOURCE_DATABASE}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: ${SPRING_DATASOURCE_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      TZ: "America/Sao_Paulo"
      SPRING_DATASOURCE_DATABASE: ${SPRING_DATASOURCE_DATABASE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-d6ebopktgctc73dvjsjg-a.oregon-postgres.render.com/${SPRING_DATASOURCE_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
    depends_on:
      - db

volumes:
    pgdata: